# DATUM — photogrammetry stack
#
# Starts NodeODM, the open-source photogrammetry engine that processes
# the uploaded photos into a textured 3D mesh.
#
# Usage:
#   docker compose up -d          # start NodeODM in background
#   docker compose logs -f        # watch reconstruction logs
#   docker compose down           # stop and remove containers
#
# After NodeODM is running, start the DATUM backend proxy:
#   cd server && npm install && node index.mjs
#
# Then start the DATUM frontend with the proxy configured:
#   VITE_PIPELINE_SERVER=http://localhost:8080 npm run dev
#
# NodeODM web UI is available at http://localhost:3000
# (not needed for DATUM — it talks to NodeODM via the proxy server)

services:
  nodeodm:
    image: opendronemap/nodeodm:latest
    ports:
      - "3000:3000"
    volumes:
      - odm_data:/var/www/data
    restart: unless-stopped
    environment:
      # Allow larger uploads (default is 100 MB)
      - MAX_UPLOAD_SIZE=0

volumes:
  odm_data:
    driver: local
